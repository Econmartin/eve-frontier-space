  <!-- Cross-document view transitions (must be in HTML, not build-processed CSS) -->
  <style>
    @view-transition {
      navigation: auto;
    }
    ::view-transition-old(root) {
      animation: vt-fade-out 0.35s ease-out forwards;
    }
    ::view-transition-new(root) {
      animation: vt-fade-in 0.35s ease-out forwards;
    }
    @keyframes vt-fade-out {
      from { opacity: 1 }
      to { opacity: 0 }
    }
    @keyframes vt-fade-in {
      from { opacity: 0 }
      to { opacity: 1 }
    }
  </style>
</head>
